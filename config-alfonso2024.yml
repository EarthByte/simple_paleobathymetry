# =============================================================================
# simple_paleobathymetry - example configuration
# =============================================================================
# Run with:  python run_paleobathymetry.py config.yml
#
# This example reproduces the default ("traditional") workflow:
#   * plate model     : Zahirovic2022 (loaded via the GPlately Plate Model Manager)
#   * proximity target: shipped COB line segments (distance to passive continental margins)
#   * obstacles       : coastlines (shortest-path distance around continents)
#   * no continent contouring, no LIPs, no seamounts
# =============================================================================


# ---- Plate model ------------------------------------------------------------
plate_model:
  # Option A (default): fetch a model from the GPlately Plate Model Manager (PMM).
  #   Set use_pmm: true and choose `name`.
  # Option B: use your own local plate-model files.
  #   Set use_pmm: false and fill in the `local:` block below.
  use_pmm: true
  name: alfonso2024            # default plate model
  data_dir: plate_model          # where PMM caches files (or where local files live)

  # Anchor plate: the plate held fixed in the reconstruction reference frame.
  # 0 = the model's default absolute (spin-axis / mantle) frame. Change it to
  # reconstruct in a different frame (e.g. a specific plate ID to hold that
  # plate fixed). This controls how ocean floor is reconstructed back through
  # time when computing the distance-to-margin grids (Step 2).
  anchor_plate_id: 0

  local:                         # only used when use_pmm: false
    rotation_files: []           #   e.g. [model/rotations.rot]
    topology_files: []           #   e.g. [model/topologies.gpml]
    coastline_files: []          #   used as continent obstacles (optional)
    static_polygon_files: []     #   e.g. [model/static_polygons.gpml] (required by Step 5 / pyBacktrack)
    # NOTE: the passive-margin proximity target (COB line segments) is set under
    # `proximity:` below, NOT here -- it is independent of the plate model.


# ---- Time range (Ma) --------------------------------------------------------
# NOTE ON DEEP TIME: the shipped COB line segments represent Mesozoic-Cenozoic
# passive margins. For reconstructions beyond ~250 Ma (pre-Pangea breakup) they
# are no longer appropriate -- switch continent contouring ON (see `proximity:`)
# to identify passive-margin segments dynamically. The workflow prints a reminder
# if `max` exceeds ~250 Ma with continent contouring still off.
time:
  min: 0
  max: 170
  step: 1
  # Do not reconstruct ocean points older than this many Ma.
  # null = limited only by the age grid; when using PMM it defaults to the
  # plate model's oldest reconstruction time.
  max_reconstruction_time: null


# ---- Passive-margin proximity source ---------------------------------------
proximity:
  # Continent contouring is OFF by default.
  #
  # DEFAULT (false): measure distance to the COB LINE SEGMENTS in the file below.
  #   Appropriate for Mesozoic-Cenozoic times (see the deep-time note below).
  # true: use dynamically contoured passive margins instead. The workflow can
  #   generate them for you (set continent_contouring.generate.enabled: true and
  #   list the continental polygons to contour), or you can point the two
  #   continent_contouring paths at files you already have.
  #   REQUIRED for deep time (beyond ~250 Ma): the shipped present-day COB line
  #   segments do not capture pre-Pangea passive margins, so contouring is used to
  #   identify passive-margin segments dynamically at each time step.
  use_continent_contouring: true

  # Passive-margin proximity target: a CLEAN set of continent-ocean-boundary
  # (COB) *line segments* (polylines) along PASSIVE margins only. The distance
  # algorithm requires line segments -- COB POLYGONS MUST NOT BE USED (a polygon
  # outline wraps the whole continent, including active margins, creating false
  # passive-margin proximities). The Plate Model Manager does not deliver COB
  # line segments, so this workflow ships a default dataset in data/ and does NOT
  # take COBs from the plate model.
  #
  # Default dataset: Global present-day COB line segments (Müller et al., 2016;
  # Gee & Kent 2007 timescale) -- the GPlates default, made compatible with
  # Zahirovic2022. Suitable for most EarthByte Mesozoic-Cenozoic plate models
  # published up to 2022, EXCEPT models with severely altered COB outlines (the
  # Clennett / Alfonso family) -- for those, supply the matching COB line
  # segments here.
  cob_line_segments: data/Global_EarthByte_GPlates_PresentDay_COBs.gpmlz

  continent_contouring:                # only used when use_continent_contouring: true
    # (a) Point at passive-margin / contour feature files you already have ...
    passive_margin_features: null      # -> proximity target
    continent_contour_features: null   # -> continent obstacle
    output_dir: null                   # where generated files go (default: output/ContinentContours)

    # ... OR (b) let the workflow generate them, by dynamically contouring
    # continents through time. The contouring engine itself is gplately's
    # (gplately.ptt.continent_contours) -- this just drives it and splits each
    # contour into passive vs active (near-subduction) margin segments, exactly
    # as EarthByte's continent-contouring `create_passive_margins.py` does. When
    # enabled, generation runs automatically before the distance step (Step 2),
    # and the two paths above are filled in from output_dir. Requires gplately.
    generate:
      enabled: true
      force: false                     # true = rebuild even if outputs already exist
      # Continental polygons to contour (the continents whose margins we trace).
      # Use your plate model's continental polygons (NOT COB line segments).
      # Leave empty ([]) when plate_model.use_pmm: true -- the PMM model's own
      # continental polygons are used automatically (model.get_continental_polygons()).
      # Only set this explicitly for a local plate model, or to override the PMM ones.
      continent_polygon_files: []
      # Contouring resolution and thresholds (EarthByte create_passive_margins.py defaults shown):
      point_spacing_degrees: 0.25
      area_threshold_square_kms: 0                  # ignore contoured-continent blobs smaller than this
      buffer_and_gap_distance_kms: 0                # expand continents ocean-ward / close small gaps (see buffer_and_gap_mode below)
      exclusion_area_threshold_square_kms: 800000   # drop enclosed interior gaps (e.g. lakes) smaller than this
      separation_distance_threshold_radians: 0.0001 # continents closer than this (~1 km) are merged into one; NOT a "how far apart" merge distance
      # A contour segment within this distance of a subduction zone is an ACTIVE
      # margin; everything else is a passive margin (the proximity target).
      max_distance_of_subduction_from_active_margin_kms: 500
      # buffer_and_gap_mode: constant (default, matches EarthByte's active default of 0) uses
      # buffer_and_gap_distance_kms above for every time/continent.
      # ramp (opt-in) reproduces EarthByte's commented-out deep-time ramp: a larger
      # buffer/gap distance before Pangea assembly, linearly interpolated down to a
      # smaller one after, reduced further for small continents. Useful for deep-time
      # (pre-Pangea) runs. Tune via buffer_and_gap_ramp below (defaults shown = EarthByte's).
      buffer_and_gap_mode: constant
      buffer_and_gap_ramp:
        pre_pangea_time_ma: 300
        post_pangea_time_ma: 250
        pre_pangea_distance_degrees: 2.5
        post_pangea_distance_degrees: 0.0
        small_continent_area_threshold_square_kms: 500000

  # true  : shortest-path distance that routes AROUND continents (water flow).
  # false : straight-line great-circle distance to the passive margins.
  use_continent_obstacles: true

  # Plate-boundary feature types that also act as obstacles (leave as default).
  plate_boundary_obstacles: [MidOceanRidge, SubductionZone]

  # Clamp the mean distance to passive margins (km). null = no clamp.
  clamp_mean_distance_km: 3000


# ---- Grid spacing (degrees) -------------------------------------------------
grids:
  internal_spacing: 0.5   # spacing used for the internal distance computation (coarser = faster)
  output_spacing: 0.1     # spacing of all final output grids


# ---- Age grids --------------------------------------------------------------
age_grids:
  # pmm   : use the age grids that ship with the PMM plate model (requires use_pmm: true).
  # local : provide a filename template below (use {time} for the age in Ma).
  source: pmm
  local_template: null    # e.g. "agegrids/seafloor_age_{time:.0f}Ma.nc"


# ---- Age -> basement depth (thermal subsidence) model -----------------------
# STEP 1 turns each seafloor-age grid into "depth to basement" (the seafloor
# depth BEFORE sediment is added). Choose one of four published subsidence
# models. See the README ("Step 1") for the equations and references.
#
#   gdh1            Stein & Stein (1992)          GDH1 plate-cooling model (default)
#   rhcw18          Richards et al. (2018)        tabulated plate-cooling model
#   parsons_sclater Parsons & Sclater (1977)      analytic model
#   crosby09        Crosby et al. (2009)          analytic model
age_depth:
  model: gdh1
  # Lookup table used ONLY by the 'rhcw18' model. It ships inside this repo, so
  # the workflow is fully standalone; you should not need to change this path.
  richards_table: data/RHCW18_age_depth.dat


# ---- Sediment-thickness relationship (Dutkiewicz et al., 2017) --------------
# These are the trained polynomial + standardisation constants relating
# log(sediment thickness) to seafloor age and distance to passive margins.
# Replace them if you retrain the relationship for a different present-day
# age grid / sediment-thickness dataset.
sediment_thickness:
  max_age: 191.87276
  mean_age: 61.18406823
  mean_distance: 1835.28118479
  variance_age: 1934.6999014
  variance_distance: 1207521.8995806
  max_distance: 3000
  polynomial_coefficients:
    [5.441401190368497, 0.46893096, -0.07320928, -0.24077496, -0.10840657,
     0.00381672, 0.06831728, 0.01179914, 0.01158149, -0.39880562]


# ---- Optional features (off by default = traditional workflow) -------------
features:
  use_lips: false
  use_seamounts: false


# ---- Runtime ----------------------------------------------------------------
run:
  # Location of the public EarthByte predicting-sediment-thickness package
  # (provides ocean_basin_proximity.py and predict_sediment_thickness.py).
  predicting_sediment_thickness_dir: submodules/predicting-sediment-thickness
  output_dir: output
  num_cpus: 8

  # Continental masking (default true). Every output describes OCEAN CRUST only,
  # so continents (cells with no seafloor age) are blanked (NaN) using the mask
  # inherited from the age grids. Set false only if you deliberately want values
  # extrapolated over continental crust.
  mask_continents: true

  steps:                  # turn individual steps on/off (useful for re-runs)
    age_to_depth: true
    distance_grids: true
    sediment_thickness: true
    paleobathymetry: true
    pybacktrack: true     # step 5: pyBacktrack paleobathymetry merged with step-4 grids
